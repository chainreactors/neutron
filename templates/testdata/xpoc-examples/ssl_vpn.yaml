        - dsl:
            - contains(set_cookie, "portal_param=")
          type: dsl
        - dsl:
            - contains(set_cookie, "client_style=")
          type: dsl
      matchers-condition: and
      method: GET
      path:
        - '{{BaseURL}}/'
