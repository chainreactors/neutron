http:
    - matchers:
        - dsl:
            - (contains(location, "/general/login/index.php") || contains(body, "redirectUrl = \"login.php\""))
          type: dsl
        - type: word
          words:
            - window.opener="eoffice";
      matchers-condition: and
      method: GET
      path:
        - '{{BaseURL}}/'
    - matchers:
        - dsl:
            - contains(location, "/eoffice10/client/web/login")
          type: dsl
      method: GET
      path:
        - '{{BaseURL}}/'
    - matchers:
        - condition: and
          type: word
          words:
            - /eoffice10/client/web/
            - eoffice_loading_tip
        - condition: and
          type: word
          words:
            - clsid:FB4EE423-43A4-4AA9-BDE9-4335A6D3C74E
            - /general/login/index.php?c=Login&a=updateSystem
      method: GET
      path:
        - '{{BaseURL}}/'
id: weaver-weaver_e_office
