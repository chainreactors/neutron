name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./operators/ ./protocols/ ./protocols/http/ ./templates/ -v -count=1 -timeout=120s

      - name: Test JSON build
        run: go test -tags json ./operators/ ./protocols/ ./protocols/http/ ./templates/ -v -count=1 -timeout=120s

      # operators/full is the opt-in gojq + htmlquery + xmlquery submodule that
      # registers `type: json` / `type: xpath` extractors/matchers. It lives in
      # its own Go module (own go.mod, own dependency closure) so the main
      # neutron module stays stdlib-only — running its tests here guards that
      # the registration surface main relies on doesn't drift.
      - name: Test operators/full submodule
        working-directory: operators/full
        run: |
          go build ./...
          go vet ./...
          go test ./... -v -count=1 -timeout=120s

      # Live end-to-end match assertions against real targets (opt-in).
      # Each xpoc example is executed against one verified target and must still
      # MATCH; only a reachable-but-no-match counts as a regression — targets
      # unreachable from the runner are skipped, so this never reds out purely
      # on network/geo blocking.
      - name: Test live match (xpoc examples)
        run: NEUTRON_LIVE_MATCH=1 go test ./templates/ -run TestXpocExamplesLiveMatch -v -count=1 -timeout=300s
