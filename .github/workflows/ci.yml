name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ['1.11', '1.17', '1.24']

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Enable Go modules (go 1.11)
        if: matrix.go-version == '1.11'
        run: echo "GO111MODULE=on" >> $GITHUB_ENV

      - name: Build
        run: |
          if [ "${{ matrix.go-version }}" = "1.11" ]; then
            go build $(go list ./... | grep -v /cmd/)
          else
            go build ./...
          fi

      - name: Vet
        if: matrix.go-version != '1.11'
        run: go vet ./...

      - name: Test
        run: |
          if [ "${{ matrix.go-version }}" = "1.11" ]; then
            go test $(go list ./... | grep -v /cmd/) -v -count=1 -timeout=180s
          else
            go test ./... -v -count=1 -timeout=180s
          fi

      - name: Test JSON build
        run: |
          if [ "${{ matrix.go-version }}" = "1.11" ]; then
            go test -tags json $(go list ./... | grep -v /cmd/) -v -count=1 -timeout=180s
          else
            go test -tags json ./... -v -count=1 -timeout=180s
          fi

      # operators/full requires go 1.24 (gojq, htmlquery, xmlquery).
      - name: Test operators/full submodule
        if: matrix.go-version == '1.24'
        working-directory: operators/full
        run: |
          go build ./...
          go vet ./...
          go test ./... -v -count=1 -timeout=120s

      # common/tlsx/full requires go 1.18+ (cfssl revocation backend).
      - name: Test common/tlsx/full submodule
        if: matrix.go-version == '1.24'
        working-directory: common/tlsx/full
        run: |
          go build ./...
          go vet ./...
          go test ./... -v -count=1 -timeout=120s

      - name: Test live match (xpoc examples)
        if: matrix.go-version == '1.24'
        run: NEUTRON_LIVE_MATCH=1 go test ./templates/ -run TestXpocExamplesLiveMatch -v -count=1 -timeout=300s
